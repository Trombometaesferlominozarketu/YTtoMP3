
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YT to MP3 | De Luxe Station</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

font-family:'Oswald',sans-serif;

overflow:hidden;

}

body{

background:url("/static/background.png");

background-size:cover;

background-position:center center;

background-repeat:no-repeat;

display:flex;

justify-content:center;

align-items:center;

position:relative;

}

body::before{

content:"";

position:absolute;

inset:0;

background:linear-gradient(

180deg,

rgba(0,0,0,.08),

rgba(0,0,0,.18),

rgba(0,0,0,.32),

rgba(0,0,0,.48)

);

}

.logo{

position:absolute;

left:50%;

top:35px;

transform:translateX(-50%);

z-index:100;

text-align:center;

width:100%;

}

.logo h1{

font-size:108px;

font-weight:700;

letter-spacing:2px;

line-height:1;

background:

linear-gradient(

180deg,

#ffffff,

#ececec 20%,

#bbbbbb 40%,

#4f4f4f 50%,

#d9d9d9 60%,

#ffffff 100%

);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

filter:

drop-shadow(0 3px 1px white)

drop-shadow(0 7px 8px rgba(0,0,0,.55));

}

.logo span{

font-family:'Pacifico',cursive;

font-size:68px;

margin:0 14px;

color:#cf4323;

-webkit-text-fill-color:#cf4323;

}

.subtitle{

margin-top:12px;

font-size:42px;

font-family:'Pacifico',cursive;

color:#ffe5a5;

text-shadow:

0 0 20px rgba(255,180,70,.45),

0 2px 5px rgba(0,0,0,.7);

}

.creator{

margin-top:18px;

font-size:18px;

font-weight:600;

letter-spacing:5px;

color:white;

text-transform:uppercase;

text-shadow:

0 2px 8px black;

}

.panel{

position:relative;

z-index:50;

margin-top:190px;

width:640px;

padding:42px;

border-radius:24px;

background:rgba(255,248,236,.90);

backdrop-filter:blur(10px);

border:4px solid rgba(255,255,255,.8);

box-shadow:

0 25px 60px rgba(0,0,0,.45);

}

.panel::before{

content:"";

position:absolute;

left:12px;

right:12px;

top:12px;

bottom:12px;

border-radius:18px;

border:2px solid rgba(160,80,30,.20);

pointer-events:none;

}

.panel h2{

text-align:center;

font-size:30px;

letter-spacing:5px;

color:#8f2c18;

margin-bottom:28px;

}

.url{

width:100%;

padding:18px;

font-size:18px;

border-radius:14px;

border:2px solid #c9b39c;

outline:none;

transition:.3s;

background:white;

}

.url:focus{

border-color:#cf4323;

box-shadow:0 0 20px rgba(207,67,35,.3);

}

.convert{

margin-top:24px;

width:100%;

padding:20px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:26px;

font-weight:700;

letter-spacing:3px;

background:

linear-gradient(

180deg,

#ef6a3d,

#cf4323,

#a02610

);

color:white;

transition:.25s;

}

.convert:hover{

transform:translateY(-3px);

box-shadow:

0 10px 30px rgba(0,0,0,.35);

}

.features{

margin-top:28px;

display:flex;

justify-content:space-between;

align-items:center;

font-size:18px;

font-weight:600;

color:#333;

}

.footer{

margin-top:30px;

text-align:center;

font-size:14px;

letter-spacing:4px;

color:#666;

text-transform:uppercase;

}

.panel{

animation:panelIn .8s ease;

}

.logo{

animation:floatLogo 6s ease-in-out infinite;

}

@keyframes panelIn{

0%{

opacity:0;

transform:translateY(35px);

}

100%{

opacity:1;

transform:translateY(0);

}

}

@keyframes floatLogo{

0%{

transform:translateX(-50%) translateY(0px);

}

50%{

transform:translateX(-50%) translateY(-8px);

}

100%{

transform:translateX(-50%) translateY(0px);

}

}

@media(max-width:800px){

.logo h1{

font-size:72px;

}

.logo span{

font-size:48px;

}

.subtitle{

font-size:28px;

}

.creator{

font-size:13px;

letter-spacing:2px;

}

.panel{

width:92%;

padding:28px;

margin-top:220px;

}

.features{

flex-direction:column;

gap:14px;

}

}

</style>

</head>

<body>

<div class="logo">

<h1>

YT <span>to</span> MP3

</h1>

<div class="subtitle">

Audio Extraction Terminal

</div>

<div class="creator">

DE LOS CREADORES DE GUFFIN X SPACE BROOM 4

</div>

</div>

<div class="panel">

<h2>

CONVERT YOUTUBE TO MP3

</h2>

<form action="/convert" method="POST">

<input

class="url"

type="text"

name="url"

placeholder="https://www.youtube.com/watch?v=..."

required>

<button

class="convert"

type="submit">

START CONVERSION

</button>

</form>

<div class="features">

<div>🎵 HIGH QUALITY</div>

<div>⚡ FAST</div>

<div>💿 MP3 192 KBPS</div>

<div>🆓 FREE</div>

</div>

<div class="footer">

POWERED BY OGRO

</div>

</div>

</body>

</html>
